name: Generate Games Index

on:
  workflow_dispatch:
  push:
    paths:
      - 'configs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate JSON Index
        run: |
          python - <<EOF_PY
          import os
          import json

          configs_dir = 'configs'
          index = {}
          games_list = []

          if os.path.exists(configs_dir):
              for game_id in sorted(os.listdir(configs_dir)):
                  game_path = os.path.join(configs_dir, game_id)
                  if os.path.isdir(game_path):
                      files = [f for f in os.listdir(game_path) if f.endswith('.json')]
                      if not files: continue

                      display_name = game_id.replace('_', ' ').title()
                      steam_id = None
                      community_image = None
                      files_info = []
                      adreno_count = 0
                      mali_count = 0
                      
                      for filename in files:
                          try:
                              with open(os.path.join(game_path, filename), 'r', encoding='utf-8') as f:
                                  data = json.load(f)
                                  meta = data.get('meta', {})
                                  
                                  display_name = meta.get('game_name', display_name)
                                  if not steam_id: steam_id = meta.get('steam_id', None)
                                  if not community_image: community_image = meta.get('community_image', None)
                                  
                                  device = meta.get('device', {})
                                  mfr = str(device.get('manufacturer', '')).capitalize()
                                  model = str(device.get('model', ''))
                                  gpu = device.get('gpu', 'Unknown GPU')
                                  notes = meta.get('notes', '')
                                  
                                  # Categories for UI Badges
                                  gpu_lower = gpu.lower()
                                  if 'adreno' in gpu_lower: adreno_count += 1
                                  elif 'mali' in gpu_lower or 'immortalis' in gpu_lower: mali_count += 1
                                  
                                  files_info.append({
                                      "filename": filename,
                                      "device_model": f"{mfr} {model}".strip() or "Unknown Device",
                                      "gpu": gpu,
                                      "notes": notes,
                                      "timestamp": meta.get('timestamp', 0)
                                  })
                          except:
                              files_info.append({"filename": filename})

                      games_list.append({
                          "id": game_id,
                          "name": display_name,
                          "steam_id": steam_id,
                          "community_image": community_image,
                          "config_count": len(files_info),
                          "adreno_count": adreno_count,
                          "mali_count": mali_count
                      })
                      
                      index[game_id] = sorted(files_info, key=lambda x: x.get('timestamp', 0), reverse=True)

          with open('index.json', 'w', encoding='utf-8') as f:
              json.dump(index, f, indent=2)

          with open('games.json', 'w', encoding='utf-8') as f:
              json.dump(sorted(games_list, key=lambda x: x['name']), f, indent=2)
          EOF_PY

      - name: Sync and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add games.json index.json
          if git diff --staged --quiet; then
            exit 0
          fi
          git commit -m "Update Index with GPU Stats and Notes [skip ci]"
          for i in {1..5}; do
            if git pull --rebase origin main && git push origin main; then
              exit 0
            fi
            sleep 5
          done
          exit 1
