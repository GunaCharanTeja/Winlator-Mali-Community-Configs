- name: Generate games.json
    run: |
      if [ -d "configs" ]; then
        find configs -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | jq -R . | jq -s . > games.json
      else
        echo "[]" > games.json
      fi
      
  - name: Generate individual index.json for each game
    run: |
      if [ -d "configs" ]; then
        for d in configs/*/ ; do
          [ -e "$d" ] || continue
          echo "[" > "${d}index.json"
          FIRST=true
          for f in "$d"*.json; do
            if [ "$(basename "$f")" != "index.json" ]; then
              if [ "$FIRST" = false ]; then echo "," >> "${d}index.json"; fi
              # Extract meta info - fixed jq syntax for older versions
              cat "$f" | jq --arg fname "$(basename "$f")" '{filename: $fname, device: .meta.device, timestamp: .meta.timestamp}' >> "${d}index.json"
              FIRST=false
            fi
          done
          echo "]" >> "${d}index.json"
        done
      fi

  - name: Commit and push changes
    run: |
      git config --global user.name "GitHub Action"
      git config --global user.email "action@github.com"
      git add .
      git commit -m "Update games index" || exit 0
      git push
