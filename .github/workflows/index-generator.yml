name: Generate Games Index

on:
  workflow_dispatch:
  push:
    paths:
      - 'configs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate Index and Sync
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Retry loop to pull, compile, and push atomically
          for i in {1..5}; do
            echo "Sync attempt $i..."
            
            # 1. Pull the latest commits from remote using rebase
            git pull --rebase origin ${{ github.ref_name }}
            
            # 2. Run the compiler script on the refreshed tree
            python index_generator.py
            
            # 3. Check if there are any changes
            git add games.json index.json
            if git diff --staged --quiet; then
              echo "Index is already up to date."
              exit 0
            fi
            
            # 4. Commit and try to push
            git commit -m "Update Index with Config Titles [skip ci]"
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push successful!"
              exit 0
            fi
            
            # 5. Push failed (race condition). Undo commit, clean generated files, and retry loop
            echo "Push failed. Retrying..."
            git reset --soft HEAD~1
            git checkout HEAD -- games.json index.json
            sleep 5
          done
          
          exit 1
