name: Generate Games Index

on:
  workflow_dispatch:
  push:
    paths:
      - 'configs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate JSON Index
        run: |
          python - <<EOF
          import os
          import json

          configs_dir = 'configs'
          index = {}
          games = []

          if os.path.exists(configs_dir):
              for game_id in sorted(os.listdir(configs_dir)):
                  game_path = os.path.join(configs_dir, game_id)
                  if os.path.isdir(game_path):
                      files = [f for f in os.listdir(game_path) if f.endswith('.json')]
                      if files:
                          # Extract metadata from the first config found
                          display_name = game_id.replace('_', ' ').title()
                          steam_id = None
                          try:
                              with open(os.path.join(game_path, files[0]), 'r') as f:
                                  data = json.load(f)
                                  meta = data.get('meta', {})
                                  display_name = meta.get('official_name', display_name)
                                  steam_id = meta.get('steam_id', None)
                          except:
                              pass

                          games.append({
                              "id": game_id,
                              "name": display_name,
                              "steam_id": steam_id
                          })
                          index[game_id] = sorted(files)

          with open('index.json', 'w') as f:
              json.dump(index, f, indent=2)

          with open('games.json', 'w') as f:
              json.dump(games, f, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Retry loop to handle race conditions from frequent uploads
          for i in {1..5}; do
            echo "Attempt $i to sync and push index..."
            
            # Re-generate or re-add the files to ensure we have the latest
            git add games.json index.json
            
            if git diff --staged --quiet; then
              echo "No changes to index files."
              exit 0
            fi
            
            # Commit the changes
            git commit -m "Auto-update Index [skip ci]" || echo "Nothing to commit"
            
            # Pull with rebase to get the files uploaded by the Worker
            if git pull --rebase origin main; then
              if git push origin main; then
                echo "Successfully pushed updated index."
                exit 0
              fi
            fi
            
            echo "Conflict detected, retrying in 5 seconds..."
            sleep 5
            git reset --soft HEAD~1 || true # Undo local commit before retrying rebase
          done
          
          echo "Failed to push index after 5 attempts."
          exit 1
