name: Generate Games Index

on:
  workflow_dispatch:
  push:
    paths:
      - 'configs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate JSON Index
        run: |
          python - <<EOF
          import os
          import json

          configs_dir = 'configs'
          index = {}
          games_list = []

          if os.path.exists(configs_dir):
              for game_id in sorted(os.listdir(configs_dir)):
                  game_path = os.path.join(configs_dir, game_id)
                  if os.path.isdir(game_path):
                      files = [f for f in os.listdir(game_path) if f.endswith('.json')]
                      if files:
                          # Use basic name from folder as default
                          display_name = game_id.replace('_', ' ').title()
                          steam_id = None
                          
                          # Try to extract richer info from the first valid JSON
                          for filename in files:
                              try:
                                  with open(os.path.join(game_path, filename), 'r', encoding='utf-8') as f:
                                      data = json.load(f)
                                      meta = data.get('meta', {})
                                      # Update with official info if available
                                      display_name = meta.get('official_name', display_name)
                                      steam_id = meta.get('steam_id', steam_id)
                                      if steam_id: break # Got what we need
                              except:
                                  continue

                          games_list.append({
                              "id": game_id,
                              "name": display_name,
                              "steam_id": steam_id
                          })
                          index[game_id] = sorted(files)

          # Output structured rich index
          with open('index.json', 'w', encoding='utf-8') as f:
              json.dump(index, f, indent=2)

          with open('games.json', 'w', encoding='utf-8') as f:
              json.dump(sorted(games_list, key=lambda x: x['name']), f, indent=2)
          EOF

      - name: Sync and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Retry loop to beat race conditions
          for i in {1..5}; do
            echo "Attempt $i to push index..."
            git add games.json index.json
            
            if git diff --staged --quiet; then
              echo "No changes needed."
              exit 0
            fi
            
            git commit -m "Auto-update Index [skip ci]"
            
            # Rebase ensures our index update goes ON TOP of any new configs
            if git pull --rebase origin main; then
              if git push origin main; then
                echo "Push successful."
                exit 0
              fi
            fi
            
            echo "Conflict detected, retrying in 3s..."
            git reset --soft HEAD~1 || true
            sleep 3
          done
          exit 1
