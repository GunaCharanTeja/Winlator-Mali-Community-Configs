name: Generate Games Index

on:
  workflow_dispatch:
  push:
    paths:
      - 'configs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate JSON Index
        run: |
          python - <<EOF
          import os
          import json

          configs_dir = 'configs'
          index = {}
          games_list = []

          if os.path.exists(configs_dir):
              # Sort to keep the list alphabetical
              for game_id in sorted(os.listdir(configs_dir)):
                  game_path = os.path.join(configs_dir, game_id)
                  if os.path.isdir(game_path):
                      files = [f for f in os.listdir(game_path) if f.endswith('.json')]
                      if files:
                          # Create a basic entry for the app
                          # The app fix I provided handles this "Object" format
                          games_list.append({
                              "id": game_id,
                              "name": game_id.replace('_', ' ').upper()
                          })
                          index[game_id] = sorted(files)

          # Output index mapping (Game ID -> List of Filenames)
          with open('index.json', 'w', encoding='utf-8') as f:
              json.dump(index, f, indent=2)

          # Output main game list
          with open('games.json', 'w', encoding='utf-8') as f:
              json.dump(games_list, f, indent=2)
          EOF

      - name: Sync and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git add games.json index.json
          
          if git diff --staged --quiet; then
            echo "No changes to index."
            exit 0
          fi
          
          git commit -m "Auto-update Index [skip ci]"
          
          # Retry loop to handle concurrent uploads
          for i in {1..5}; do
            if git pull --rebase origin main && git push origin main; then
              echo "Push successful."
              exit 0
            fi
            sleep 3
          done
          exit 1
